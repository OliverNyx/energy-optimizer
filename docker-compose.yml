version: "3.9"

# ─────────────────────────────────────────────────────────────
# Smart Energy Optimizer — Docker Compose
#
# Architecture:
#   Internet → nginx:80/443 → (docker network) → app:5000
#
# Usage:
#   docker compose up -d           # start
#   docker compose logs -f app     # stream app logs
#   docker compose down            # stop
# ─────────────────────────────────────────────────────────────

services:

  # ── Flask ML backend ───────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: energy_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # These override .env so Docker paths are always correct
      DATA_DIR:    /app/data
      MODELS_DIR:  /app/models
      LOG_DIR:     /app/logs
      STATIC_DIR:  /app/static
    volumes:
      # Data files (read-only — place CSVs/XLSXs here before starting)
      - ./data:/app/data:ro
      # Model artefacts (read-write — persisted across container restarts)
      - models_vol:/app/models
      # Application logs
      - logs_vol:/app/logs
      # Dashboard HTML served by Flask
      - ./static:/app/static:ro
    expose:
      - "5000"          # internal only; nginx proxies inbound traffic
    networks:
      - energy_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s    # allow time for model training on first run

  # ── Nginx reverse proxy ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: energy_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Place cert.pem + key.pem here for HTTPS
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - energy_net

# ── Named volumes ─────────────────────────────────────────────
volumes:
  models_vol:
    driver: local
  logs_vol:
    driver: local

# ── Internal network ──────────────────────────────────────────
networks:
  energy_net:
    driver: bridge
